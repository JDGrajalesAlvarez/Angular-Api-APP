<h2>Movimientos</h2>

<table>
    <tr>
        <th>Producto</th>
        <th>Tipo</th>
        <th>Cantidad</th>
        <th>Fecha</th>
    </tr>

    <tr *ngFor="let m of movimientos">
        <td>{{m.nombre}}</td>
        <td>{{m.tipo}}</td>
        <td>{{m.cantidad}}</td>
        <td>{{m.fecha}}</td>
    </tr>

</table>
