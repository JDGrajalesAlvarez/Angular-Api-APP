<div class="pagina-productos">
  <h1 class="titulo">
    Productos Disponibles
  </h1>
  <div class="contenedor">
    <div class="card" *ngFor="let producto of productos">
      <img [src]="producto.image">
      <h3>{{producto.title}}</h3>
      <p class="precio">
        $ {{producto.price}}
      </p>
      <button>
        Ver Producto
      </button>
    </div>
  </div>
</div>
